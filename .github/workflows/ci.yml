name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: core (fmt + clippy + test)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: clippy
        if: always()
        run: cargo clippy --workspace --exclude vobes-desktop --all-targets -- -D warnings

      - name: test
        if: always()
        run: cargo test --workspace --exclude vobes-desktop

      - name: build release (sanity)
        if: always()
        run: cargo build --release -p vobes-cli

  desktop:
    name: desktop (tauri build)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
            deps: >-
              libwebkit2gtk-4.1-dev
              libgtk-3-dev
              libayatana-appindicator3-dev
              librsvg2-dev
              libsoup-3.0-dev
              libjavascriptcoregtk-4.1-dev
              build-essential
              curl
              wget
              file
          - os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: install linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.deps }}

      - name: install frontend deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      - name: build frontend
        working-directory: desktop
        run: pnpm build

      - name: clippy desktop
        run: cargo clippy -p vobes-desktop --all-targets -- -D warnings

      - name: build desktop (debug)
        run: cargo build -p vobes-desktop