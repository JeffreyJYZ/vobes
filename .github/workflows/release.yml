name: release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    name: release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
          - os: ubuntu-22.04-arm
            platform: linux-arm
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: install mac targets (universal)
        if: matrix.platform == 'macos'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: install linux deps (x64)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            build-essential curl wget file

      - name: install linux deps (arm64)
        if: matrix.platform == 'linux-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            build-essential curl wget file

      - name: install frontend deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      - name: build + publish desktop
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional, uncomment + add secrets to enable):
          # macOS:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows:
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Vobes ${{ github.ref_name }}"
          releaseBody: |
            Vobes ${{ github.ref_name }} — pre-alpha.

            Desktop app (unsigned): expect Gatekeeper / SmartScreen warnings on first run.
            macOS desktop bundle is universal (arm64 + x64).
            Linux desktop: x64 and arm64 (deb + appimage).
            CLI binary `vbs` for each platform/arch is attached as `vbs-<platform>-<arch>[.exe]`.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'macos' && '--target universal-apple-darwin' || '' }}

      - name: build CLI binary (native)
        run: cargo build --release -p vobes-cli

      - name: build CLI binary (intel mac)
        if: matrix.platform == 'macos'
        run: cargo build --release -p vobes-cli --target x86_64-apple-darwin

      - name: package CLI binary (macos)
        if: matrix.platform == 'macos'
        run: |
          mkdir -p cli
          cp target/release/vbs cli/vbs-macos-aarch64
          cp target/x86_64-apple-darwin/release/vbs cli/vbs-macos-x64

      - name: package CLI binary (linux x64)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p cli
          cp target/release/vbs cli/vbs-linux-x64

      - name: package CLI binary (linux arm64)
        if: matrix.platform == 'linux-arm'
        run: |
          mkdir -p cli
          cp target/release/vbs cli/vbs-linux-aarch64

      - name: package CLI binary (windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p cli
          cp target/release/vbs.exe cli/vbs-windows-x64.exe

      - name: upload CLI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: cli/*