# Example Vobes configuration.
# real config lives at:
#   macOS/Linux: ~/.config/vobes/config.toml
#   Windows:     %APPDATA%\vobes\config.toml
# `vbs init` writes a default there for you.

[general]
name = "My Workspace"

[scan]
roots = ["~/dev", "~/work"]
exclude = ["scratch", "experiments", "tmp"]
max_depth = 4
follow_symlinks = false

[display]
theme = "auto"
date_format = "relative"
default_sort = "last_modified"

[git]
cache_ttl_seconds = 60
fetch_upstream = false

[export]
path = "~/.vobes/snapshots"
format = "json"